name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag override (auto = derive from package.json semver)"
        required: false
        default: "auto"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build

      - name: Resolve release channel
        id: release
        env:
          NPM_TAG_INPUT: ${{ inputs.npm_tag || 'auto' }}
        run: bash .github/scripts/resolve-release.sh

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="${{ steps.release.outputs.version }}"
          NPM_TAG="${{ steps.release.outputs.npm_tag }}"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public --provenance --tag "${NPM_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.release.outputs.version }}"
          PRERELEASE_ARGS=()
          if [ "${{ steps.release.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_ARGS=(--prerelease)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
          else
            gh release create "${TAG}" --generate-notes --verify-tag "${PRERELEASE_ARGS[@]}"
          fi
