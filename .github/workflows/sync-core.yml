name: Sync Core

on:
  repository_dispatch:
    types: [core-release]
  workflow_dispatch:
    inputs:
      version:
        description: "@amiriel/core version, with or without leading v"
        required: true
      npm_tag:
        description: "npm dist-tag override (auto = derive from package.json semver)"
        required: false
        default: "auto"

permissions:
  contents: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AMIRIELJS_SYNC_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve core version
        id: core
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          VERSION="${VERSION#v}"
          if [ -z "${VERSION}" ]; then
            echo "Missing core version."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update core dependency
        run: |
          npm pkg set "dependencies.@amiriel/core=^${{ steps.core.outputs.version }}"
          pnpm install --no-frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run build

      - name: Align package version with core release
        run: |
          pnpm version "${{ steps.core.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Resolve release channel
        id: release
        env:
          NPM_TAG_INPUT: ${{ github.event.client_payload.npm_tag || inputs.npm_tag || 'auto' }}
        run: bash .github/scripts/resolve-release.sh

      - name: Commit and tag
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          git config user.name "amirieljs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: sync @amiriel/core to ${{ steps.core.outputs.version }}"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="${{ steps.release.outputs.version }}"
          NPM_TAG="${{ steps.release.outputs.npm_tag }}"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public --provenance --tag "${NPM_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.release.outputs.version }}"
          PRERELEASE_ARGS=()
          if [ "${{ steps.release.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_ARGS=(--prerelease)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
          else
            gh release create "${TAG}" --generate-notes --verify-tag "${PRERELEASE_ARGS[@]}"
          fi
